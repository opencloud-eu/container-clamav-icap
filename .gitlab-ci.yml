---
include:
  project: "bmi/opendesk/tooling/gitlab-config"
  ref: "v2.3.0"
  file:
    - "ci/common/lint.yml"
    - "ci/container/container-build.yml"
    - "ci/container/container-lint.yml"

stages:
  - ".pre"
  - "lint"
  - "build"
  - "scan"
  - "release"
  - ".post"

container-build:
  variables:
    BUILD_DESTINATION: "${CI_REGISTRY_IMAGE}:0.5.10"

.common:
  tags: []

...
